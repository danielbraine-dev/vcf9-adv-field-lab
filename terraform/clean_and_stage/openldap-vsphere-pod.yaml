---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openldap-data
  namespace: shared-infrastructure 
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 3Gi
  storageClassName: vsan-default-storage-policy 
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shared-openldap
  namespace: shared-infrastructure
  labels:
    app: openldap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openldap
  template:
    metadata:
      labels:
        app: openldap
    spec:
      containers:
      - name: openldap
        image: harbor.lb.site-a.vcf.lab/library/osixia-openldap:1.5.0
        # THE FIX: Hijack the startup command to safely copy files without mounting directly
        command: ["/bin/bash", "-c"]
        args:
          - |
            mkdir -p /container/service/slapd/assets/config/bootstrap/ldif/custom
            cp /custom-ldif/*.ldif /container/service/slapd/assets/config/bootstrap/ldif/custom/
            exec /container/tool/run --loglevel info
        ports:
        - containerPort: 389
        - containerPort: 636
        env:
        - name: LDAP_ORGANISATION
          value: "VCF Tenant LDAP"
        - name: LDAP_DOMAIN
          value: "vcf.lab"
        - name: LDAP_ADMIN_PASSWORD
          value: "VMware123!"
        # THE FIX: Disable internal TLS generation to bypass the missing template crash
        - name: LDAP_TLS
          value: "false"
        volumeMounts:
        - name: ldap-data
          mountPath: /var/lib/ldap
        - name: ldap-config
          mountPath: /etc/ldap/slapd.d
        - name: configmap-volume
          mountPath: /custom-ldif
      volumes:
      - name: ldap-data
        persistentVolumeClaim:
          claimName: openldap-data
      - name: ldap-config
        emptyDir: {}
      - name: configmap-volume
        configMap:
          name: openldap-bootstrap
---
apiVersion: v1
kind: Service
metadata:
  name: openldap-lb
  namespace: shared-infrastructure
spec:
  type: LoadBalancer 
  ports:
  - name: ldap
    port: 389
    targetPort: 389
  - name: ldaps
    port: 636
    targetPort: 636
  selector:
    app: openldap
