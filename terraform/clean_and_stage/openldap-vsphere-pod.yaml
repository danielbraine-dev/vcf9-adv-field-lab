    cn: project_adv_user
    member: uid=advuser_tenant123,ou=tenant123,ou=Cloud Org A,dc=vcf,dc=lab

    dn: cn=project_user,ou=tenant123,ou=Cloud Org A,dc=vcf,dc=lab
    objectClass: groupOfNames
    cn: project_user
    member: uid=user_tenant123,ou=tenant123,ou=Cloud Org A,dc=vcf,dc=lab

    # ==========================
    # TENANT 456
    # ==========================
    dn: ou=tenant456,ou=Cloud Org A,dc=vcf,dc=lab
    objectClass: organizationalUnit
    ou: tenant456

    # --- Tenant 456 Users ---
    dn: uid=admin_tenant456,ou=tenant456,ou=Cloud Org A,dc=vcf,dc=lab
    objectClass: inetOrgPerson
    uid: admin_tenant456
    sn: Admin
    cn: Tenant 456 Admin
